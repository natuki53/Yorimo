services:
  postgres:
    image: postgres:16-alpine
    container_name: yorimo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: yorimo
      POSTGRES_USER: yorimo
      POSTGRES_PASSWORD: yorimo_password
    ports:
      - "5432:5432"
    volumes:
      - yorimo-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yorimo -d yorimo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  yorimo-postgres-data:
