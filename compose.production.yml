name: yorimo

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yorimo}
      POSTGRES_USER: ${POSTGRES_USER:-yorimo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yorimo} -d ${POSTGRES_DB:-yorimo}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app-network

  app:
    build:
      context: .
      args:
        VITE_GOOGLE_MAPS_BROWSER_PUBLIC_ID: ${VITE_GOOGLE_MAPS_API_KEY:?VITE_GOOGLE_MAPS_API_KEY is required}
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-yorimo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-yorimo}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      DEMO_MODE: ${DEMO_MODE:-true}
      ALLOW_DEMO_RESET: ${ALLOW_DEMO_RESET:-false}
      EXPOSE_API_DOCS: ${EXPOSE_API_DOCS:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://yorimo.mu-natuki.com}
      DEMO_LOGIN_RATE_LIMIT: ${DEMO_LOGIN_RATE_LIMIT:-90}
      DEMO_MUTATION_RATE_LIMIT: ${DEMO_MUTATION_RATE_LIMIT:-600}
      RECOMMENDATION_RATE_LIMIT: ${RECOMMENDATION_RATE_LIMIT:-180}
      GOOGLE_MAPS_SERVER_API_KEY: ${GOOGLE_MAPS_SERVER_API_KEY:?GOOGLE_MAPS_SERVER_API_KEY is required}
    ports:
      - "127.0.0.1:8085:4000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:4000/ready').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    networks:
      - app-network

  cloudflared:
    image: cloudflare/cloudflared:2026.7.1
    profiles: ["public"]
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token-file
      - /run/secrets/cloudflared_token
    secrets:
      - cloudflared_token
    security_opt:
      - no-new-privileges:true
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:

secrets:
  cloudflared_token:
    file: ./secrets/cloudflared-token
